        <title>johnnythe.dev</title>
        <script type="text/javascript">
            // Intercept the query string redirect and restore the clean URL path
            (function (l) {
                if (l.search[1] === "p") {
                    var decoded = l.search
                        .slice(1)
                        .split("&")
                        .map(function (s) {
                            return s.replace(/~and~/g, "&");
                        })
                        .reduce(function (r, q) {
                            var p = q.split("=");
                            r[p[0]] = p.slice(1).join("=");
                            return r;
                        }, {});

                    if (decoded.p !== undefined) {
                        window.history.replaceState(
                            null,
                            null,
                            l.pathname.slice(0, -1) +
                                decoded.p +
                                (decoded.q ? "?" + decoded.q : "") +
                                l.hash,
                        );
                    }
                }
            })(window.location);
        </script>

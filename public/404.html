<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>johnnythe.dev</title>
        <script type="text/javascript">
            // Segment the current URL path and redirect to index.html with a query string
            var pathSegmentsToKeep = 0; // Set to 0 if using a custom domain (johnnythe.dev)

            var l = window.location;
            l.replace(
                l.protocol +
                    "//" +
                    l.hostname +
                    (l.port ? ":" + l.port : "") +
                    l.pathname
                        .split("/")
                        .slice(0, 1 + pathSegmentsToKeep)
                        .join("/") +
                    "/?p=" +
                    l.pathname
                        .split("/")
                        .slice(1 + pathSegmentsToKeep)
                        .join("/")
                        .replace(/&/g, "~and~") +
                    (l.search
                        ? "&q=" + l.search.slice(1).replace(/&/g, "~and~")
                        : "") +
                    l.hash,
            );
        </script>
    </head>
    <body></body>
</html>
